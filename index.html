<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Particle Button</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<button id="particleBtn"
class="relative flex items-center gap-2 bg-blue-600 text-white px-6 py-3 rounded-lg shadow hover:bg-blue-700 transition">

Click Me

<svg xmlns="http://www.w3.org/2000/svg"
class="w-4 h-4"
fill="none"
viewBox="0 0 24 24"
stroke="currentColor">

<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
d="M5 3l14 9-14 9V3z" />

</svg>

</button>

<div id="particles"></div>

<script>

const button = document.getElementById("particleBtn")
const container = document.getElementById("particles")

button.addEventListener("click", () => {

const rect = button.getBoundingClientRect()

const centerX = rect.left + rect.width/2
const centerY = rect.top + rect.height/2

for(let i=0;i<8;i++){

const particle = document.createElement("div")

particle.className =
"fixed w-2 h-2 bg-black rounded-full pointer-events-none"

particle.style.left = centerX + "px"
particle.style.top = centerY + "px"

container.appendChild(particle)

const angle = Math.random()*2*Math.PI
const distance = Math.random()*80 + 40

const x = Math.cos(angle)*distance
const y = Math.sin(angle)*distance

particle.animate(

[
{ transform:"translate(0,0) scale(1)", opacity:1 },
{ transform:`translate(${x}px,${y}px) scale(0)`, opacity:0 }

],

{
duration:600,
easing:"ease-out"
}

)

setTimeout(()=>{

particle.remove()

},600)

}

})

</script>

</body>
</html>
