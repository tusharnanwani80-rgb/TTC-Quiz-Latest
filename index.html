<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TTC Testimonials</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="max-w-3xl mx-auto py-20 text-center">

<img src="https://i.ibb.co/dsBdtCwK/Ttc-logo.png" class="w-20 mx-auto mb-6">

<h2 class="text-4xl font-bold mb-10">
Student Testimonials
</h2>

<div class="relative overflow-hidden">

<div id="carousel" class="flex transition-transform duration-500">

<!-- CARD 1 -->
<div class="min-w-full flex justify-center">
<div class="bg-white shadow-xl rounded-xl p-8 w-80">

<img src="https://randomuser.me/api/portraits/men/1.jpg"
class="w-16 h-16 rounded-full mx-auto mb-4">

<h3 class="font-semibold text-lg">
John Doe
</h3>

<p class="text-gray-600 text-sm mt-2">
Amazing experience working with this team! The results exceeded my expectations.
</p>

</div>
</div>

<!-- CARD 2 -->
<div class="min-w-full flex justify-center">
<div class="bg-white shadow-xl rounded-xl p-8 w-80">

<img src="https://randomuser.me/api/portraits/women/1.jpg"
class="w-16 h-16 rounded-full mx-auto mb-4">

<h3 class="font-semibold text-lg">
Jane Smith
</h3>

<p class="text-gray-600 text-sm mt-2">
Highly recommended! Great service and professional approach.
</p>

</div>
</div>

<!-- CARD 3 -->
<div class="min-w-full flex justify-center">
<div class="bg-white shadow-xl rounded-xl p-8 w-80">

<img src="https://randomuser.me/api/portraits/men/2.jpg"
class="w-16 h-16 rounded-full mx-auto mb-4">

<h3 class="font-semibold text-lg">
Mike Johnson
</h3>

<p class="text-gray-600 text-sm mt-2">
Exceptional quality and professionalism. Would definitely work with them again.
</p>

</div>
</div>

</div>

<!-- ARROWS -->
<button onclick="prevSlide()" 
class="absolute left-0 top-1/2 transform -translate-y-1/2 bg-white shadow p-3 rounded-full">

←

</button>

<button onclick="nextSlide()" 
class="absolute right-0 top-1/2 transform -translate-y-1/2 bg-white shadow p-3 rounded-full">

→

</button>

</div>

<!-- DOTS -->
<div class="flex justify-center mt-6 gap-2">

<div class="dot w-3 h-3 rounded-full bg-blue-500"></div>
<div class="dot w-3 h-3 rounded-full bg-gray-300"></div>
<div class="dot w-3 h-3 rounded-full bg-gray-300"></div>

</div>

</div>

<script>

let index = 0

const carousel = document.getElementById("carousel")
const dots = document.querySelectorAll(".dot")

function updateCarousel() {

carousel.style.transform = `translateX(-${index * 100}%)`

dots.forEach((dot,i)=>{
dot.classList.remove("bg-blue-500")
dot.classList.add("bg-gray-300")

if(i===index){
dot.classList.add("bg-blue-500")
}
})

}

function nextSlide(){

index++
if(index>2) index=0

updateCarousel()

}

function prevSlide(){

index--
if(index<0) index=2

updateCarousel()

}

</script>

</body>
</html>
