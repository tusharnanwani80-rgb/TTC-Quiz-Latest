<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TTC Quiz - Tenses</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f5f1e8;
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:700px;
text-align:center;
}

.logo{
width:90px;
display:block;
margin:auto;
margin-bottom:10px;
}

.card{
background:white;
border-radius:20px;
padding:30px;
box-shadow:0 12px 25px rgba(0,0,0,0.12);
transition:0.3s;
}

button{
padding:12px 22px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
box-shadow:0 8px 16px rgba(0,0,0,0.1);
transition:0.25s;
}

button:hover{
transform:translateY(-3px);
}

.startBtn{
background:#77e0c4;
}

.option{
display:block;
margin:10px 0;
background:#eee;
width:100%;
}

.correct{
background:#7be495 !important;
}

.wrong{
background:#ff7b7b !important;
}

.progress{
width:100%;
height:14px;
background:#eee;
border-radius:10px;
margin:15px 0;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#77e0c4,#b59cff);
transition:0.4s;
}

.nextBtn{
background:#ff8a8a;
margin-top:15px;
display:none;
}

.explanation{
margin-top:15px;
color:#444;
font-size:14px;
}

.floating{
position:fixed;
right:15px;
bottom:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.floating a{
width:50px;
height:50px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-decoration:none;
font-size:22px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.whatsapp{background:#25D366;}
.map{background:#ff6b6b;}

.result{
display:none;
}

.footer{
margin-top:20px;
font-size:12px;
color:#777;
}

input{
padding:10px;
border-radius:10px;
border:1px solid #ddd;
width:80%;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div id="entry" class="card">

<img src="https://i.ibb.co/dsBdtCwK/Ttc-logo.png" class="logo">

<h2>Enter Your Name</h2>

<input id="nameInput" placeholder="Your name">

<br><br>

<button class="startBtn" onclick="saveName()">Continue</button>

</div>


<div id="welcome" class="card" style="display:none">

<img src="https://i.ibb.co/dsBdtCwK/Ttc-logo.png" class="logo">

<h2 id="welcomeText"></h2>

<button class="startBtn" onclick="startQuiz()">Start Quiz</button>

</div>


<div id="quiz" class="card" style="display:none">

<img src="https://i.ibb.co/dsBdtCwK/Ttc-logo.png" class="logo">

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<h3 id="question"></h3>

<div id="options"></div>

<div class="explanation" id="explanation"></div>

<button class="nextBtn" id="nextBtn" onclick="nextQuestion()">Next Question</button>

</div>


<div id="result" class="card result">

<img src="https://i.ibb.co/dsBdtCwK/Ttc-logo.png" class="logo">

<h2>Quiz Result</h2>

<h3 id="score"></h3>

<p id="message"></p>

<button onclick="restartQuiz()">Restart Quiz</button>

<div class="footer">
Powered by TTC: Tushar Tuition Classes, Wardha
</div>

</div>

</div>


<div class="floating">

<a class="whatsapp" href="https://wa.me/917517445450">W</a>

<a class="map" href="https://maps.app.goo.gl/gp7xCdhtr53HhHoc6">M</a>

</div>


<script>

let name = localStorage.getItem("ttcName")

if(name){
document.getElementById("entry").style.display="none"
showWelcome(name)
}

function saveName(){

name=document.getElementById("nameInput").value

localStorage.setItem("ttcName",name)

showWelcome(name)

}

function showWelcome(n){

document.getElementById("welcome").style.display="block"

document.getElementById("welcomeText").innerText="Welcome, TTC Champ "+n

}

const questions=[

{
question:"She ___ to school every day.",
options:["go","goes","going","gone"],
correct:1,
explanation:"Simple Present tense uses 'goes' for third person singular."
},

{
question:"I ___ my homework yesterday.",
options:["did","do","done","doing"],
correct:0,
explanation:"Past tense of do is 'did'."
},

{
question:"They ___ playing football now.",
options:["is","are","was","be"],
correct:1,
explanation:"Present continuous uses 'are' with plural subjects."
},

{
question:"He ___ finished the work.",
options:["have","has","had","having"],
correct:1,
explanation:"Present perfect uses 'has' with he/she/it."
},

{
question:"We ___ watching a movie tomorrow.",
options:["will","will be","were","be"],
correct:1,
explanation:"Future continuous uses 'will be'."
}

]

let current=0
let score=0

function startQuiz(){

document.getElementById("welcome").style.display="none"

document.getElementById("quiz").style.display="block"

loadQuestion()

}

function loadQuestion(){

let q=questions[current]

document.getElementById("question").innerText=q.question

let optionsHTML=""

q.options.forEach((opt,i)=>{

optionsHTML+=`<button class="option" onclick="selectOption(${i},this)">${opt}</button>`

})

document.getElementById("options").innerHTML=optionsHTML

document.getElementById("explanation").innerHTML=""

document.getElementById("nextBtn").style.display="none"

document.getElementById("bar").style.width=(current/questions.length)*100+"%"

}

function selectOption(i,btn){

let q=questions[current]

let buttons=document.querySelectorAll(".option")

buttons.forEach(b=>b.disabled=true)

if(i===q.correct){

btn.classList.add("correct")

score++

}else{

btn.classList.add("wrong")

buttons[q.correct].classList.add("correct")

}

document.getElementById("explanation").innerText=q.explanation

document.getElementById("nextBtn").style.display="inline-block"

}

function nextQuestion(){

current++

if(current<questions.length){

loadQuestion()

}else{

showResult()

}

}

function showResult(){

document.getElementById("quiz").style.display="none"

document.getElementById("result").style.display="block"

document.getElementById("score").innerText=score+" / "+questions.length

let percent=(score/questions.length)*100

if(percent>=75){

document.getElementById("message").innerText="Well Done, "+name+"! You’re a true TTC Champ!"

}else{

document.getElementById("message").innerText="Good attempt! Keep practicing."

}

}

function restartQuiz(){

current=0
score=0

document.getElementById("result").style.display="none"

document.getElementById("quiz").style.display="block"

loadQuestion()

}

</script>

</body>
</html>
